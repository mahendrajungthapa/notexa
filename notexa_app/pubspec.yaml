name: notexa
description: Notexa - Collaborative Note Taking App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.0
  provider: ^6.1.0
  file_picker: ^8.0.0
  url_launcher: ^6.2.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  path_provider: ^2.1.0
  connectivity_plus: ^6.0.0
  syncfusion_flutter_pdfviewer: ^27.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
